{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | ReVamp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: url("{% static 'carousel_images/background.jpg' %}") no-repeat center center fixed;
      background-size: cover;
      color: #4b2e2e;
      font-family: 'Poppins', sans-serif;
      padding-top: 70px;
    }
    html {
      scroll-behavior: smooth;
      overflow-y: scroll;
    }
    h1, h2, h5, .navbar-brand {
      font-family: 'Cinzel', serif;
    }
    .navbar {
      background-color: #fff0e6;
    }
    .navbar-brand {
      font-weight: 600;
      color: #8c1c13 !important;
      font-size: 28px;
    }
    .navbar-nav .nav-link {
      color: #5c3d3d !important;
      margin: 0 12px;
      font-weight: 500;
    }
    .navbar-nav .nav-link.active {
      border-bottom: 2px solid #b02e0c;
    }

    .login-container {
      max-width: 450px;
      margin: 120px auto 60px; /* margin-top increased to accommodate fixed navbar */
      background-color: #fff3e9;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #e5c9b1;
      box-shadow: 0 2px 8px rgba(140, 28, 19, 0.1);
    }
    .login-container h2 {
      font-family: 'Cinzel', serif;
      color: #8c1c13;
      margin-bottom: 25px;
      text-align: center;
    }
    label {
      font-weight: 500;
      margin-top: 12px;
    }
    .form-control {
      border-radius: 5px;
    }
    .btn-login {
      background-color: #8c1c13;
      color: white;
      border: none;
      margin-top: 20px;
      width: 100%;
    }
    .btn-login:hover {
      background-color: #a5281c;
    }
    .text-small {
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
    }
    .text-small a {
      color: #8c1c13;
      text-decoration: none;
    }
    .text-small a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body data-bs-spy="scroll" data-bs-target="#navbarNav" data-bs-offset="70" tabindex="0">

  {% include 'partials/navbar.html' %}

  <div class="login-container">
    <h2>Welcome Back</h2>

    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="mb-3">
        <label for="id_username">Username</label>
        <input type="text" name="username" class="form-control" id="id_username" placeholder="Enter your username" required>
      </div>

      <div class="mb-3">
        <label for="id_password">Password</label>
        <input type="password" name="password" class="form-control" id="id_password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-login">Login</button>
    </form>

    <p class="text-small mt-3">
      New here? <a href="{% url 'register' %}">Create an account</a>
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

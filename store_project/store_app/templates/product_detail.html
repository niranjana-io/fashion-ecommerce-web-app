{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ product.name }} | ReVamp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: url("{% static 'carousel_images/background.jpg' %}") no-repeat center center fixed;
      background-size: cover;
      color: #4b2e2e;
      font-family: 'Poppins', sans-serif;
      padding-top: 70px;
    }
    .product-section {
      max-width: 1140px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 40px 15px;
    }
    .product-image {
      width: 500px;
      max-height: 600px;
      object-fit: contain;
      background-color: #fff3e9;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .product-info {
      flex: 1;
      min-width: 300px;
    }
    .product-name {
      font-family: 'Cinzel', serif;
      color: #8c1c13;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .product-price {
      font-size: 24px;
      color: #a14d3a;
      margin-bottom: 30px;
    }
    .btn-primary {
      background-color: #8c1c13;
      border: none;
      padding: 10px 30px;
    }
    .btn-primary:hover {
      background-color: #a5281c;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8c1c13;
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="product-section">
  <img src="{{ product.image_url }}" alt="{{ product.name }}" class="product-image">

  <div class="product-info">
    <h2 class="product-name">{{ product.name }}</h2>
    <p class="product-price">₹{{ product.price }}</p>

    <form method="post" action="{% url 'add_to_cart' product.id %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary">Add to Cart</button>
    </form>

    <br>
    <a href="{% url 'products' %}?page={{ request.GET.page|default:'1' }}" class="back-link">← Back to Collections</a>
  </div>
</div>

<script>
  function saveScroll() {
    sessionStorage.setItem("scrollY", window.scrollY);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
